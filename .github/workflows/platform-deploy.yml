name: Platform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, stage, prod]
      component:
        description: Component to deploy
        required: true
        type: choice
        options: [all, infrastructure, backend, frontend]
        default: all

jobs:
  # ── 0. Preflight ──────────────────────────────────────────────────────────────
  preflight:
    name: "0. Preflight checks (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run preflight checks
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          chmod +x scripts/preflight-check.sh
          if [[ "${{ inputs.environment }}" == "prod" ]]; then
            echo "deploy prod" | ./scripts/preflight-check.sh ${{ inputs.environment }} ${{ inputs.component }}
          else
            ./scripts/preflight-check.sh ${{ inputs.environment }} ${{ inputs.component }}
          fi

  # ── 1. Terraform ─────────────────────────────────────────────────────────────
  # PROD GATE: add required reviewers to the prod GitHub Environment so this job
  # pauses for manual approval before apply runs.
  # Repo → Settings → Environments → prod → Required reviewers.
  infrastructure:
    name: "1. Terraform (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [preflight]
    if: inputs.component == 'all' || inputs.component == 'infrastructure'
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          repository: TanWZac/aws-tf
          token: ${{ secrets.PLATFORM_DEPLOY_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Terraform init
        run: |
          terraform init \
            -input=false \
            -backend-config=environments/${{ inputs.environment }}/backend.hcl

      - name: Terraform plan
        run: |
          terraform plan \
            -input=false \
            -var-file=environments/${{ inputs.environment }}/terraform.tfvars \
            -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false tfplan

  # ── 2. Backend ───────────────────────────────────────────────────────────────
  backend:
    name: "2. Backend (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [preflight, infrastructure]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped') &&
      (inputs.component == 'all' || inputs.component == 'backend')
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          repository: TanWZac/aws-python-platform-template
          token: ${{ secrets.PLATFORM_DEPLOY_TOKEN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # Always resolve from SSM directly — never rely on infrastructure job outputs,
      # which are empty when the job was skipped (e.g. backend-only deploy).
      # Do NOT mix GitHub expression fallback (${{ x || 'y' }}) with shell
      # substitution syntax — expressions evaluate before the shell runs and
      # produce literal strings, not commands.
      - name: Resolve SSM parameters
        id: ssm
        run: |
          ENV="${{ inputs.environment }}"
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          get() {
            val=$(aws ssm get-parameter \
              --name "/platform/$ENV/$1" \
              --query Parameter.Value \
              --output text \
              --region "$REGION" 2>/dev/null) \
            || { echo "::error::SSM /platform/$ENV/$1 not found. Run infrastructure deploy first." >&2; exit 1; }
            echo "$val"
          }
          echo "ecr_url=$(get ecr-repository-url)"   >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=$(get ecs-cluster-name)" >> "$GITHUB_OUTPUT"
          echo "ecs_service=$(get ecs-service-name)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE="${{ steps.ssm.outputs.ecr_url }}:${{ inputs.environment }}-${SHORT_SHA}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build -t "$IMAGE" .

      - name: Scan image (block on CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@0.25.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Push image
        # Push only the immutable SHA-tagged image. No mutable *-latest tag —
        # latest tags break rollback traceability.
        run: docker push "${{ env.IMAGE }}"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "${{ steps.ssm.outputs.ecs_cluster }}" \
            --service "${{ steps.ssm.outputs.ecs_service }}" \
            --force-new-deployment \
            --region "${{ vars.AWS_REGION || 'us-east-1' }}" \
            --output text > /dev/null

      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.ssm.outputs.ecs_cluster }}" \
            --services "${{ steps.ssm.outputs.ecs_service }}" \
            --region "${{ vars.AWS_REGION || 'us-east-1' }}"

  # ── 3. Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: "3. Frontend (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [preflight, infrastructure, backend]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (inputs.component == 'all' || inputs.component == 'frontend')
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          repository: TanWZac/aws-web-platform-template
          token: ${{ secrets.PLATFORM_DEPLOY_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # Always resolve from SSM directly — same reasoning as backend job.
      - name: Resolve SSM parameters
        id: ssm
        run: |
          ENV="${{ inputs.environment }}"
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          get() {
            val=$(aws ssm get-parameter \
              --name "/platform/$ENV/$1" \
              --query Parameter.Value \
              --output text \
              --region "$REGION" 2>/dev/null) \
            || { echo "::error::SSM /platform/$ENV/$1 not found. Run infrastructure deploy first." >&2; exit 1; }
            echo "$val"
          }
          echo "api_url=$(get api-gateway-url)"               >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$(get s3-frontend-bucket)"          >> "$GITHUB_OUTPUT"
          echo "cf_dist_id=$(get cloudfront-distribution-id)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.ssm.outputs.api_url }}
          NEXT_PUBLIC_APP_ENV: ${{ inputs.environment }}
          NEXT_PUBLIC_APP_NAME: ${{ vars.APP_NAME || 'AWS Platform' }}
        run: npm run build

      - name: Sync to S3
        run: |
          S3="${{ steps.ssm.outputs.s3_bucket }}"
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"

          aws s3 sync out/ "s3://${S3}" --delete --region "$REGION" \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"

          # --exclude "*" is required before --include; without it, --include is a no-op
          # and the second sync overwrites all files with no-cache headers.
          aws s3 sync out/ "s3://${S3}" --delete --region "$REGION" \
            --cache-control "public,max-age=0,must-revalidate" \
            --exclude "*" --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.ssm.outputs.cf_dist_id }}" \
            --paths "/*" \
            --output text > /dev/null

  # ── 4. Smoke test ─────────────────────────────────────────────────────────────
  smoke:
    name: "4. Smoke test (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    needs: [preflight, infrastructure, backend, frontend]
    if: |
      always() &&
      needs.preflight.result == 'success' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped') &&
      (inputs.component == 'all')
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Resolve endpoints from SSM
        id: ssm
        run: |
          ENV="${{ inputs.environment }}"
          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          get() {
            aws ssm get-parameter --name "/platform/$ENV/$1" \
              --query Parameter.Value --output text --region "$REGION" 2>/dev/null \
            || echo ""
          }
          echo "api_url=$(get api-gateway-url)"       >> "$GITHUB_OUTPUT"
          echo "cf_domain=$(get cloudfront-domain)"   >> "$GITHUB_OUTPUT"

      - name: Smoke test — backend health
        run: |
          API="${{ steps.ssm.outputs.api_url }}"
          if [[ -z "$API" ]]; then
            echo "No API URL in SSM — skipping backend smoke test."
            exit 0
          fi

          echo "Hitting ${API}/health/ready ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${API}/health/ready")
            if [[ "$STATUS" == "200" ]]; then
              echo "Backend healthy (HTTP 200)"
              break
            fi
            echo "Attempt $i: got HTTP $STATUS — retrying in 10s..."
            sleep 10
          done

          if [[ "$STATUS" != "200" ]]; then
            echo "::error::Backend smoke test FAILED — ${API}/health/ready returned HTTP $STATUS"
            exit 1
          fi

      - name: Smoke test — frontend reachable
        run: |
          CF="${{ steps.ssm.outputs.cf_domain }}"
          if [[ -z "$CF" ]]; then
            echo "No CloudFront domain in SSM — skipping frontend smoke test."
            exit 0
          fi

          echo "Hitting https://${CF}/ ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://${CF}/")
          if [[ "$STATUS" =~ ^2[0-9]{2}$ ]]; then
            echo "Frontend reachable (HTTP $STATUS)"
          else
            echo "::error::Frontend smoke test FAILED — https://${CF}/ returned HTTP $STATUS"
            exit 1
          fi
